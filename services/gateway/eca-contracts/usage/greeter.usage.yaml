# Usage contract: gateway → greeter
# The gateway just forwards greetings — it reads every field of the response.
# Kept as a minimal reference for the basic shape of a usage contract.

consumer: gateway
consumer_version: "1.0.0"
provider: greeter
provider_version: ">=1.0.0"
protocol: grpc

operations:
  SayHello:
    description: "Get a greeting to forward to the caller"
    request:
      fields_sent:
        name:
          type: string
          optionality: required
    response:
      fields_read:
        - field: message
          type: string
          required: true
        - field: from
          type: string
          required: true
    interactions:
      - name: "hello world"
        given: "greeter is reachable"
        request:
          name: "world"
        response:
          message: "Hello, world!"
          from: "greeter@v1"
